<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barcode Scanner</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 16px;
         background: #111; color: #eee; text-align: center; }
  h1 { font-size: 1.2rem; margin: 8px 0; }
  #cam { position: relative; display: inline-block; width: 100%; max-width: 420px; }
  #video { width: 100%; border-radius: 12px; background: #000; display: block; }
  #reticle { --c: rgba(34, 197, 94, 0.9); position: absolute; top: 15%; left: 12%;
             right: 12%; bottom: 15%; pointer-events: none; display: none; }
  #reticle.on { display: block; }
  #reticle.hit { --c: #4dff88; filter: drop-shadow(0 0 6px #22c55e); }
  #reticle i { position: absolute; width: 26px; height: 26px; border: 0 solid var(--c); }
  #reticle i.tl { top: 0; left: 0; border-top-width: 3px; border-left-width: 3px; border-top-left-radius: 8px; }
  #reticle i.tr { top: 0; right: 0; border-top-width: 3px; border-right-width: 3px; border-top-right-radius: 8px; }
  #reticle i.bl { bottom: 0; left: 0; border-bottom-width: 3px; border-left-width: 3px; border-bottom-left-radius: 8px; }
  #reticle i.br { bottom: 0; right: 0; border-bottom-width: 3px; border-right-width: 3px; border-bottom-right-radius: 8px; }
  #reticle::before, #reticle::after { content: ""; position: absolute; top: 50%; left: 50%;
             transform: translate(-50%, -50%); background: var(--c); }
  #reticle::before { width: 26px; height: 2px; }
  #reticle::after { width: 2px; height: 26px; }
  button, label.big { display: inline-block; padding: 14px 28px; margin: 12px 4px;
           font-size: 1.05rem; font-weight: 600; border: 0; border-radius: 12px;
           background: #2563eb; color: #fff; cursor: pointer; user-select: none; }
  button:disabled { opacity: 0.5; }
  label.big { background: #374151; }
  input[type=file] { display: none; }
  #msg { min-height: 1.4em; color: #eab308; font-size: 0.9rem; }
  ul { list-style: none; padding: 0; max-width: 420px; margin: 8px auto; text-align: left; }
  li { padding: 8px 12px; margin: 6px 0; border-radius: 8px; background: #222;
       font-size: 0.9rem; overflow-wrap: anywhere; }
  li.ok { border-left: 4px solid #22c55e; }
  li.err { border-left: 4px solid #ef4444; }
</style>
</head>
<body>
<h1>📷 Scan barcodes &amp; QR codes</h1>
<div id="cam">
  <video id="video" playsinline muted></video>
  <div id="reticle"><i class="tl"></i><i class="tr"></i><i class="bl"></i><i class="br"></i></div>
</div>
<div>
  <button id="startBtn">Start scanning</button>
  <button id="stopBtn" disabled>Stop</button>
  <label class="big">📸 Snap a photo
    <input id="photoInput" type="file" accept="image/*" capture="environment">
  </label>
</div>
<div id="msg"></div>
<ul id="log"></ul>
<canvas id="frame" hidden></canvas>
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<script>
"use strict";
// Same endpoint + payload shape as the LAN server; the Apps Script needs no changes.
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzrrxeSahFQ3nJSzZQrq3I3gLfLBR-SkhuzsDJ_1kwD6e3a2rQV6Q-1Y6Hp9sjtW0CH/exec";
const SHEET_ID = "1boVsC5FNp5dT86BbHmJCbuz8Ie9xrIYki7_ixCm6cig";

const video = document.getElementById("video");
const frame = document.getElementById("frame");
const msg = document.getElementById("msg");
const logEl = document.getElementById("log");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const photoInput = document.getElementById("photoInput");
const reticle = document.getElementById("reticle");

let stream = null, running = false, nativeDetector = null, zxingReader = null;
const recent = new Map();          // code -> last-seen ms, to skip immediate re-reads
const COOLDOWN_MS = 4000;

function note(text, cls) {
  const li = document.createElement("li");
  li.textContent = text;
  li.className = cls || "";
  logEl.prepend(li);
  while (logEl.children.length > 30) logEl.lastChild.remove();
  return li;
}

function timestamp() {
  const d = new Date(), p = n => String(n).padStart(2, "0");
  return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate()) +
         " " + p(d.getHours()) + ":" + p(d.getMinutes()) + ":" + p(d.getSeconds());
}

async function setupDetector() {
  if (nativeDetector || zxingReader) return;
  if ("BarcodeDetector" in window) {
    try {
      const formats = await BarcodeDetector.getSupportedFormats();
      if (formats.length) { nativeDetector = new BarcodeDetector({ formats: formats }); return; }
    } catch (e) { /* fall through to ZXing */ }
  }
  if (typeof ZXing === "undefined") throw new Error("decoder library failed to load");
  const hints = new Map();
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
  zxingReader = new ZXing.MultiFormatReader();
  zxingReader.setHints(hints);
}

function decodeCanvas(canvas) {
  // returns Promise of [{data, format}], empty if nothing found
  if (nativeDetector) {
    return nativeDetector.detect(canvas)
      .then(codes => codes.map(c => ({ data: c.rawValue, format: c.format })));
  }
  try {
    const source = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
    const bitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(source));
    const result = zxingReader.decode(bitmap);
    return Promise.resolve([{
      data: result.getText(),
      format: ZXing.BarcodeFormat[result.getBarcodeFormat()],
    }]);
  } catch (e) {
    return Promise.resolve([]); // NotFoundException = no code in this frame
  } finally {
    if (zxingReader) zxingReader.reset();
  }
}

async function sendToSheet(data, format) {
  // text/plain avoids a CORS preflight, which Apps Script cannot answer
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 20000);
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ sheet_id: SHEET_ID, rows: [[timestamp(), format, data, "web"]] }),
      signal: ctrl.signal,
    });
    const info = await res.json();
    if (!info.ok) throw new Error(info.error || "sheet rejected the scan");
    return info;
  } finally {
    clearTimeout(timer);
  }
}

async function submit(code) {
  const li = note("Sending " + code.data + "…");
  for (let attempt = 1; attempt <= 3; attempt++) {
    try {
      const info = await sendToSheet(code.data, String(code.format));
      li.textContent = "✅ [" + code.format + "] " + code.data + " → sheet (+" + info.appended + ")";
      li.className = "ok";
      if (navigator.vibrate) navigator.vibrate(120);
      reticle.classList.add("hit");
      setTimeout(() => reticle.classList.remove("hit"), 400);
      return;
    } catch (e) {
      if (attempt === 3) {
        li.textContent = "❌ " + code.data + ": " + (e && e.message ? e.message : "send failed");
        li.className = "err";
      } else {
        await new Promise(r => setTimeout(r, 1000 * attempt));
      }
    }
  }
}

function handleCodes(codes) {
  const now = Date.now();
  let found = false;
  for (const c of codes) {
    if (!c.data) continue;
    found = true;
    const last = recent.get(c.data) || 0;
    if (now - last < COOLDOWN_MS) continue;
    recent.set(c.data, now);
    submit(c);
  }
  return found;
}

async function scanLoop() {
  while (running) {
    try {
      if (video.readyState >= 2 && video.videoWidth) {
        frame.width = video.videoWidth;
        frame.height = video.videoHeight;
        frame.getContext("2d").drawImage(video, 0, 0);
        handleCodes(await decodeCanvas(frame));
      }
    } catch (e) {
      console.error(e); // never let one bad frame kill the loop
    }
    await new Promise(r => setTimeout(r, 250));
  }
}

async function start() {
  startBtn.disabled = true;
  msg.textContent = "";
  try {
    await setupDetector();
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 } },
      audio: false,
    });
    video.srcObject = stream;
    await video.play();
    running = true;
    stopBtn.disabled = false;
    reticle.classList.add("on");
    msg.textContent = "Scanning (" + (nativeDetector ? "native detector" : "ZXing") + ")… point at a code";
    scanLoop();
  } catch (e) {
    startBtn.disabled = false;
    msg.textContent = "Live camera unavailable (" + e.message + ") — use “Snap a photo” instead.";
  }
}

function stop() {
  running = false;
  stopBtn.disabled = true;
  startBtn.disabled = false;
  reticle.classList.remove("on", "hit");
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  msg.textContent = "Stopped.";
}

photoInput.addEventListener("change", () => {
  const file = photoInput.files && photoInput.files[0];
  photoInput.value = ""; // allow re-selecting the same photo
  if (!file) return;
  const li = note("Reading photo…");
  const img = new Image();
  img.onload = async () => {
    URL.revokeObjectURL(img.src);
    try {
      await setupDetector();
      const scale = Math.min(1, 1280 / img.naturalWidth);
      frame.width = Math.round(img.naturalWidth * scale);
      frame.height = Math.round(img.naturalHeight * scale);
      frame.getContext("2d").drawImage(img, 0, 0, frame.width, frame.height);
      li.remove();
      if (!handleCodes(await decodeCanvas(frame))) {
        note("❌ No barcode found in that photo — try closer and well-lit", "err");
      }
    } catch (e) {
      li.textContent = "❌ Could not decode photo: " + e.message;
      li.className = "err";
    }
  };
  img.onerror = () => { li.textContent = "❌ Could not read that image"; li.className = "err"; };
  img.src = URL.createObjectURL(file);
});

startBtn.addEventListener("click", start);
stopBtn.addEventListener("click", stop);
</script>
</body>
</html>
